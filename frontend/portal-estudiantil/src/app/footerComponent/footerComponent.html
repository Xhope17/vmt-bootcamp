<div class="flex flex-col items-center px-4 py-2 bg-gray-200">
  @if (anio == 0) {
    <button
      (click)="anio = obtenerAnio()"
      class="bg-yellow-200 hover:bg-yellow-300 text-gray-800 font-bold py-2 px-4 rounded"
    >
      Actualizar Año
    </button>
  } @else {
    <p>Derechos Reservados</p>
    <p>{{ anio }}&copy;</p>
  }
</div>
